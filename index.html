<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f7f8ff">
  <title>杭州暑假周末候选玩法</title>
  <style>
    :root {
      --ink: #4d4b61; --muted: #79778d; --paper: #f7f8ff; --white: #fffefe;
      --pink: #e9e2f7; --pink-strong: #8c70b1; --lavender: #e8e2f8;
      --mint: #e1eefb; --mint-strong: #6686aa; --yellow: #eeeafb;
      --blue: #dfeefa; --line: rgba(91,88,130,.14); --shadow: 0 12px 34px rgba(91,88,135,.11);
      --radius: 26px; --toolbar-h: 72px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { margin: 0; color: var(--ink); background: var(--paper); font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; line-height: 1.65; }
    button { font: inherit; }
    .bg-shape { position: fixed; z-index: -1; border-radius: 999px; filter: blur(2px); opacity: .65; pointer-events: none; }
    .bg-1 { width: 260px; height: 260px; background: var(--lavender); top: 8%; left: -150px; }
    .bg-2 { width: 340px; height: 340px; background: var(--blue); top: 42%; right: -210px; }
    .toolbar { position: sticky; top: 0; z-index: 20; padding: 10px max(14px,env(safe-area-inset-left)); background: rgba(247,248,255,.9); backdrop-filter: blur(18px); border-bottom: 1px solid var(--line); }
    .toolbar-inner { max-width: 1100px; margin: auto; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
    .toolbar-inner::-webkit-scrollbar { display: none; }
    .tool-btn { flex: 0 0 auto; min-height: 42px; padding: 9px 15px; border: 1px solid var(--line); border-radius: 999px; background: var(--white); color: var(--ink); cursor: pointer; box-shadow: 0 4px 14px rgba(112,93,111,.06); transition: .2s ease; }
    .tool-btn:hover, .tool-btn:focus-visible { transform: translateY(-1px); border-color: rgba(126,105,176,.38); }
    .tool-btn.active { background: var(--lavender); border-color: transparent; color: #665287; font-weight: 700; }
    .tool-btn.primary { background: var(--blue); color: #4f7094; font-weight: 700; }
    main { max-width: 1100px; margin: auto; padding: 52px 18px 80px; }
    .hero { position: relative; padding: clamp(28px,6vw,58px); border: 1px solid rgba(255,255,255,.85); border-radius: 36px; background: linear-gradient(135deg,rgba(223,238,250,.96),rgba(232,226,248,.88) 52%,rgba(218,231,250,.94)); box-shadow: var(--shadow); overflow: hidden; }
    .hero:after { content: "杭州 · 周末"; position: absolute; right: -12px; bottom: -25px; color: rgba(255,255,255,.54); font-size: clamp(48px,9vw,96px); font-weight: 900; letter-spacing: .08em; white-space: nowrap; }
    .eyebrow { position: relative; z-index: 1; margin: 0 0 9px; font-size: 13px; letter-spacing: .18em; font-weight: 800; color: #756394; }
    h1 { position: relative; z-index: 1; margin: 0; max-width: 820px; font-size: clamp(30px,5.4vw,58px); line-height: 1.16; letter-spacing: -.035em; }
    .subtitle { position: relative; z-index: 1; max-width: 780px; margin: 18px 0 0; color: #6f6873; font-size: clamp(15px,2vw,18px); }
    .section { margin: 48px 0 52px; scroll-margin-top: 90px; }
    .section-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 18px; margin: 0 4px 17px; }
    .section-title { margin: 0; font-size: clamp(24px,3vw,34px); line-height: 1.2; }
    .section-kicker { margin: 5px 0 0; color: var(--muted); font-size: 14px; }
    .count { flex: 0 0 auto; padding: 6px 11px; border-radius: 999px; background: var(--lavender); color: #716281; font-size: 13px; font-weight: 700; }
    .grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 15px; }
    .card { min-width: 0; padding: 21px; background: var(--white); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); transition: opacity .22s,filter .22s,transform .22s,border .22s; }
    .card:hover { transform: translateY(-2px); }
    .card.excluded { opacity: .53; filter: grayscale(.45); }
    .card.favorite { border-color: rgba(126,105,176,.38); }
    .card-top { display: flex; align-items: flex-start; gap: 13px; }
    .emoji { display: grid; place-items: center; flex: 0 0 44px; width: 44px; height: 44px; border-radius: 15px; background: var(--card-tint,var(--blue)); font-size: 23px; }
    .card-copy { min-width: 0; flex: 1; }
    .card h3 { margin: 1px 0 5px; font-size: 18px; line-height: 1.35; }
    .card p { margin: 0; color: var(--muted); font-size: 14px; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 13px; }
    .tag { padding: 3px 9px; border-radius: 999px; background: #f7f4f2; color: #837b80; font-size: 12px; }
    .picks { margin-top: 14px; padding: 12px 13px; border-radius: 16px; background: color-mix(in srgb,var(--card-tint) 42%,white); }
    .picks-title { display: block; margin-bottom: 6px; color: #6d6670; font-size: 12px; font-weight: 800; letter-spacing: .04em; }
    .pick-list { margin: 0; padding: 0; list-style: none; display: grid; gap: 5px; }
    .pick-list li { position: relative; padding-left: 13px; color: #706a73; font-size: 13px; line-height: 1.45; }
    .pick-list li:before { content: "•"; position: absolute; left: 0; color: var(--pink-strong); }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-top: 17px; }
    .vote { min-height: 43px; border: 1px solid var(--line); border-radius: 14px; background: #fff; color: var(--ink); cursor: pointer; transition: .18s ease; }
    .vote:hover, .vote:focus-visible { transform: translateY(-1px); box-shadow: 0 6px 15px rgba(112,93,111,.09); }
    .vote.fav.selected { background: var(--lavender); border-color: transparent; color: #6d5792; font-weight: 800; }
    .vote.no.selected { background: #ebe9eb; border-color: transparent; color: #6d6770; font-weight: 800; }
    .card[hidden], .section[hidden] { display: none; }
    .results { margin-top: 22px; padding: clamp(22px,4vw,38px); border-radius: 32px; background: linear-gradient(145deg,#fff,#edf3fc 52%,#f0ebfa); border: 1px solid var(--line); box-shadow: var(--shadow); scroll-margin-top: 88px; }
    .results h2 { margin: 0; font-size: clamp(26px,4vw,38px); }
    .results-intro { margin: 6px 0 21px; color: var(--muted); }
    .result-empty { padding: 25px; text-align: center; border: 1px dashed rgba(100,88,105,.2); border-radius: 18px; color: var(--muted); }
    .result-block { padding: 19px 0; border-top: 1px solid var(--line); }
    .result-block:first-child { border-top: 0; }
    .result-block h3 { margin: 0 0 10px; }
    .result-row { display: grid; grid-template-columns: 90px 1fr; gap: 10px; margin: 7px 0; font-size: 14px; }
    .result-label { font-weight: 800; }
    .result-label.f { color: #745d9c; } .result-label.n { color: #6e6870; } .result-label.o { color: #6683a3; }
    .result-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 21px; }
    .result-actions button { min-height: 44px; padding: 9px 16px; border: 1px solid var(--line); border-radius: 14px; background: var(--white); color: var(--ink); cursor: pointer; }
    .result-actions .strong { background: var(--blue); color: #4f7094; border-color: transparent; font-weight: 800; }
    .footer-note { margin: 28px 0 0; text-align: center; color: var(--muted); font-size: 14px; }
    .footer-note strong { display: block; margin-bottom: 5px; color: #71608f; font-size: 16px; }
    .toast { position: fixed; z-index: 50; left: 50%; bottom: max(22px,env(safe-area-inset-bottom)); transform: translate(-50%,20px); padding: 11px 17px; border-radius: 999px; color: white; background: rgba(77,71,81,.92); opacity: 0; pointer-events: none; transition: .25s ease; box-shadow: var(--shadow); }
    .toast.show { opacity: 1; transform: translate(-50%,0); }
    @media (max-width: 680px) {
      :root { --radius: 22px; }
      .toolbar { padding-right: 10px; padding-left: 10px; }
      main { padding: 26px 13px 62px; }
      .hero { border-radius: 28px; }
      .hero:after { font-size: 48px; }
      .grid { grid-template-columns: 1fr; }
      .section { margin-bottom: 42px; }
      .card { padding: 18px; }
      .result-row { grid-template-columns: 75px 1fr; }
    }
    @media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } *,*:before,*:after { transition: none !important; } }
  </style>
</head>
<body>
  <div class="bg-shape bg-1"></div><div class="bg-shape bg-2"></div>
  <nav class="toolbar" aria-label="候选筛选与操作">
    <div class="toolbar-inner">
      <button class="tool-btn active" data-filter="all">显示全部</button>
      <button class="tool-btn" data-filter="favorite">只看心选</button>
      <button class="tool-btn" data-filter="excluded">查看已排除</button>
      <button class="tool-btn" id="resetBtn">恢复默认</button>
      <button class="tool-btn primary" id="generateTop">保存 / 更新结果</button>
    </div>
  </nav>

  <main>
    <header class="hero">
      <p class="eyebrow">HANGZHOU WEEKEND · 三人份快乐</p>
      <h1>欢迎花儿和33来杭州！你们更想怎么玩？</h1>
      <p class="subtitle">两天半不够逛完杭州，但足够一起选出最想要的快乐。山水、夜风、躺平和好吃的都摆在这里——你们只管心动，行程交给我们之后再拼。</p>
    </header>
    <div id="sections"></div>

    <section class="results" id="results">
      <h2>最终选择结果</h2>
      <p class="results-intro">选择会自动保存在当前浏览器里，但没有后台数据库；全部选完后，请先点“保存 / 更新结果”，再复制发给我哦～</p>
      <div id="resultContent" class="result-empty">还没有生成结果，先随便点点看，或者直接生成也可以。</div>
      <div class="result-actions">
        <button class="strong" id="generateBottom">保存 / 更新结果</button>
        <button id="copyBtn">复制结果</button>
      </div>
    </section>
    <p class="footer-note"><strong>杭州很大，周末很短，最重要的是我们三个一起玩得开心。</strong>等你们按下心选，我们再把这些小愿望拼成刚刚好的周末。餐饮人均是常见消费区间，方便大家轻松挑选；榜单、价格和营业状态会变化，出发前我们再一起确认。</p>
  </main>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

        'hangzhou-food':['都来饭店：2026 米其林必比登新上榜，约 ¥80–150/人','食为鲜（上城）：2026 米其林必比登新上榜，约 ¥80–150/人','福缘居：杭帮菜口碑老店，约 ¥100–200/人'],
        'taizhou-food':['荣小馆：黄鱼年糕、沙蒜豆面，约 ¥150–250/人','台州府：家烧海鲜与临海小吃，约 ¥120–220/人','阿平饭店：家常小炒路线，约 ¥80–150/人'],
        'quzhou-food':['衢村长：鸭头、辣味小炒与衢州风味，约 ¥80–150/人','衢饭儿：年轻化衢州菜，约 ¥60–120/人','老裴鸭头：三头一掌外带路线，约 ¥30–70/人'],
        burger:['Three Fingers：牛肉汉堡，建议周五中午外卖，约 ¥50–100/人'],
        noodle:['小辫子面店：2026 米其林必比登新上榜，约 ¥25–50/人','荣鲜面馆：米其林必比登，现炒浇头面，约 ¥25–50/人','方老大面：米其林必比登，虾爆鳝等浇头，约 ¥30–60/人'],
        snacks:['衢州烧饼：梅干菜肉馅，搭配其他小吃约 ¥20–40/人','饭团：糯米饭团配豆浆的早餐组合，约 ¥20–35/人','蕙心小吃店：米其林必比登杭州小吃，约 ¥30–60/人'],
        hotpot:['老秦凉都黄牛肉馆：现切黄牛肉，约 ¥100–180/人','肉本家·炭烤肉：朋友聚餐型烤肉，约 ¥120–220/人','盛邦肥牛：三人火锅局，约 ¥100–180/人']
      };

      let choices = loadChoices();
      let filter = 'all';
      let resultReady = false;
      let toastTimer;
      const sectionsEl = document.getElementById('sections');
      const resultEl = document.getElementById('resultContent');

      function loadChoices() {
        try { const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); return saved && typeof saved === 'object' ? saved : {}; }
        catch (_) { return {}; }
      }
      function saveChoices() { localStorage.setItem(STORAGE_KEY, JSON.stringify(choices)); }
      function escapeHtml(value) { return String(value).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
      function getState(id) { const c = choices[id] || {}; return c.excluded ? 'excluded' : c.favorite ? 'favorite' : 'other'; }
      function cardTemplate(item, tint) {
        const [id,emoji,title,desc,tags] = item, state = getState(id);
        const picks = recommendations[id] || [];
        const picksLabel = id.includes('food') || ['burger','noodle','snacks','hotpot','coffee','tea','bar'].includes(id) ? '榜单 / 口碑候选' : '具体去处 / 玩法';
        return `<article class="card ${state === 'excluded' ? 'excluded' : ''} ${state === 'favorite' ? 'favorite' : ''}" data-id="${id}" data-state="${state}" style="--card-tint:${tint}">
          <div class="card-top"><div class="emoji" aria-hidden="true">${emoji}</div><div class="card-copy"><h3>${escapeHtml(title)}</h3><p>${escapeHtml(desc)}</p><div class="tags">${tags.map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join('')}</div><div class="picks"><span class="picks-title">${picksLabel}</span><ul class="pick-list">${picks.map(p=>`<li>${escapeHtml(p)}</li>`).join('')}</ul></div></div></div>
          <div class="actions"><button class="vote fav ${choices[id]?.favorite ? 'selected' : ''}" data-action="favorite" aria-pressed="${!!choices[id]?.favorite}" aria-label="心选：${escapeHtml(title)}">${choices[id]?.favorite ? '♥' : '♡'} 心选</button><button class="vote no ${choices[id]?.excluded ? 'selected' : ''}" data-action="excluded" aria-pressed="${!!choices[id]?.excluded}" aria-label="婉拒：${escapeHtml(title)}">⊘ 婉拒</button></div>
        </article>`;
      }
      function render() {
        sectionsEl.innerHTML = categories.map(cat => {
          const visible = cat.items.filter(i => filter === 'all' || getState(i[0]) === filter);
          return `<section class="section" data-category="${cat.id}" ${visible.length ? '' : 'hidden'}><div class="section-head"><div><h2 class="section-title">${cat.title}</h2><p class="section-kicker">${cat.kicker}</p></div><span class="count">${visible.length} 项</span></div><div class="grid">${cat.items.map(i => cardTemplate(i,cat.tint)).join('')}</div></section>`;
        }).join('');
        applyFilter();
      }
      function applyFilter() {
        document.querySelectorAll('.card').forEach(card => { card.hidden = filter !== 'all' && card.dataset.state !== filter; });
        document.querySelectorAll('.section').forEach(section => {
          const shown = [...section.querySelectorAll('.card')].filter(c => !c.hidden).length;
          section.hidden = shown === 0;
          section.querySelector('.count').textContent = `${shown} 项`;
        });
      }
      function toggleChoice(id, action) {
        const current = choices[id] || { favorite:false, excluded:false };
        current[action] = !current[action];
        choices[id] = current.favorite || current.excluded ? current : undefined;
        if (!choices[id]) delete choices[id];
        saveChoices(); resultReady = false; render();
        showToast(action === 'favorite' ? (current.favorite ? '已加入心选 ♥' : '已取消心选') : (current.excluded ? '已标记婉拒' : '已取消婉拒'));
      }
      function resultData() {
        return categories.map(cat => ({...cat, favorite:cat.items.filter(i=>getState(i[0])==='favorite'), excluded:cat.items.filter(i=>getState(i[0])==='excluded'), other:cat.items.filter(i=>getState(i[0])==='other')}));
      }
      function generateResult(scroll = false) {
        resultEl.className = '';
        resultEl.innerHTML = resultData().map(cat => `<div class="result-block"><h3>${cat.title}</h3>${resultRow('♥ 心选',cat.favorite,'f')}${resultRow('⊘ 婉拒',cat.excluded,'n')}${resultRow('○ 其他未选',cat.other,'o')}</div>`).join('');
        resultReady = true;
        if (scroll) document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
        showToast('结果已保存 / 更新');
      }
      function resultRow(label, items, cls) { return `<div class="result-row"><span class="result-label ${cls}">${label}</span><span>${items.length ? items.map(i=>escapeHtml(i[2])).join('、') : '（无）'}</span></div>`; }
      function resultText() {
        const lines = ['杭州暑假周末候选玩法｜我的选择',''];
        resultData().forEach(cat => { lines.push(`【${cat.title}】`,`♥ 心选：${cat.favorite.length ? cat.favorite.map(i=>i[2]).join('、') : '（无）'}`,`⊘ 婉拒：${cat.excluded.length ? cat.excluded.map(i=>i[2]).join('、') : '（无）'}`,`○ 其他未选：${cat.other.length ? cat.other.map(i=>i[2]).join('、') : '（无）'}`,''); });
        lines.push('其他未选＝不排斥，也没非去不可，主打一个随大部队行动。','杭州很大，周末很短，最重要的是我们三个一起玩得开心。');
        return lines.join('\n');
      }
      async function copyResult(successText='结果已复制') {
        if (!resultReady) { document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'}); showToast('请先保存 / 更新结果'); return; }
        const text = resultText();
        try { await navigator.clipboard.writeText(text); showToast(successText); }
        catch (_) { const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); showToast(successText); }
      }
      function showToast(text) { const el=document.getElementById('toast'); el.textContent=text; el.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),1800); }

      sectionsEl.addEventListener('click', e => { const btn=e.target.closest('.vote'); if (!btn) return; toggleChoice(btn.closest('.card').dataset.id,btn.dataset.action); });
      document.querySelectorAll('[data-filter]').forEach(btn => btn.addEventListener('click', () => { filter=btn.dataset.filter; document.querySelectorAll('[data-filter]').forEach(b=>b.classList.toggle('active',b===btn)); render(); }));
      document.getElementById('resetBtn').addEventListener('click', () => { if (confirm('要清空所有心选和婉拒，恢复到随大部队模式吗？')) { choices={}; resultReady=false; localStorage.removeItem(STORAGE_KEY); filter='all'; document.querySelectorAll('[data-filter]').forEach(b=>b.classList.toggle('active',b.dataset.filter==='all')); render(); resultEl.className='result-empty'; resultEl.textContent='已恢复默认。重新选也行，直接随大部队也行。'; showToast('已恢复默认'); } });
      document.getElementById('generateTop').addEventListener('click',()=>generateResult(true));
      document.getElementById('generateBottom').addEventListener('click',()=>generateResult(false));
      document.getElementById('copyBtn').addEventListener('click',()=>copyResult());
      render();
    })();
  </script>
</body>
</html>
